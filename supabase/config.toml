# Supabase local development configuration
[project]
# Project ID for local development
id = "picasso-hair-salon"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "auth"]

[auth]
enabled = true
# OAuth-only authentication
email_confirm = false
enable_signup = false  # Disable email/password signups
# JWT settings
jwt_expiry = 3600

# External OAuth providers
[auth.external.github]
enabled = true
client_id = "env(SUPABASE_AUTH_GITHUB_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GITHUB_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
# Configure test buckets
[storage.buckets.avatars]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]

[storage.buckets.documents]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf", "application/msword"]

# Email authentication disabled - OAuth only
[auth.email]
enable_signup = false
enable_confirmations = false

[auth.sms]
enable_signup = false

# Function hooks
[functions]
enabled = true